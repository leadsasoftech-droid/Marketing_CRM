<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MarketingCRM - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f2f4f8",
                        "primary-fixed": "#dbe1ff",
                        "surface": "#f7f9fd",
                        "on-tertiary-fixed": "#001b3d",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eff1f5",
                        "secondary-fixed-dim": "#3de273",
                        "on-secondary-fixed-variant": "#005322",
                        "on-surface": "#191c1f",
                        "on-tertiary-fixed-variant": "#244778",
                        "surface-container": "#eceef2",
                        "on-background": "#191c1f",
                        "secondary-fixed": "#66ff8e",
                        "surface-container-highest": "#e0e2e6",
                        "surface-variant": "#e0e2e6",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#f3f3ff",
                        "secondary": "#006d2f",
                        "on-primary-fixed-variant": "#003da9",
                        "inverse-primary": "#b4c5ff",
                        "on-primary-fixed": "#00174c",
                        "surface-dim": "#d8dade",
                        "tertiary": "#365789",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#5070a4",
                        "surface-tint": "#0052dd",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2d3134",
                        "background": "#f7f9fd",
                        "outline": "#737687",
                        "outline-variant": "#c3c6d8",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e6e8ec",
                        "secondary-container": "#5dfd8a",
                        "on-secondary-container": "#007232",
                        "on-surface-variant": "#424656",
                        "primary-container": "#0f62fe",
                        "primary": "#004ccd",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#a8c8ff",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-bright": "#f7f9fd",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#f1f4ff",
                        "tertiary-fixed": "#d6e3ff",
                        "on-secondary-fixed": "#002109"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "margin-page": "32px",
                        "stack-sm": "4px",
                        "container-max-width": "1440px",
                        "base": "8px",
                        "sidebar-width": "260px",
                        "stack-md": "12px",
                        "stack-lg": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "code-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-xl": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "code-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-xl": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-gutter font-body-lg text-on-surface">
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0px_8px_24px_rgba(0,0,0,0.12)] border border-outline-variant overflow-hidden">
<div class="p-stack-lg border-b border-outline-variant/30 text-center">
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tight mb-stack-sm">MarketingCRM</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your enterprise suite</p>
</div>
<form action="#" class="p-stack-lg flex flex-col gap-stack-lg" method="POST">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email or User ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim transition-all font-body-md text-body-md text-on-surface outline-none placeholder:text-outline/60" id="email" name="email" placeholder="Enter your email" required="" type="text"/>
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-10 py-2 bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim transition-all font-body-md text-body-md text-on-surface outline-none placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 mt-stack-sm">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary-fixed-dim bg-surface-container-lowest cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full mt-stack-sm bg-primary text-on-primary py-3 px-6 rounded font-label-md text-label-md hover:bg-primary-container transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-primary-fixed-dim focus:outline-none flex justify-center items-center gap-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="px-stack-lg pb-stack-lg pt-4 text-center border-t border-outline-variant/30 bg-surface-bright">
<p class="font-body-md text-body-md text-on-surface-variant">
                Need help accessing your account? <a class="text-primary hover:underline font-label-md" href="#">Contact Support</a>
</p>
</div>
</main>
</body></html>
